name: employee_hub
description: Employee Management Hub
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  http_parser: ^4.0.0
  file_picker: ^8.0.0+1
  pdf: ^3.11.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  url_launcher: ^6.2.1
  file_saver: ^0.2.14
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
