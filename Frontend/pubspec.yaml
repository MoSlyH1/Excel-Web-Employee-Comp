    - assets/fonts/NotoSansArabic-Bold.ttf
    - assets/r4_template_blank.png
    - assets/r1_3_template_blank.png
    - assets/r3_template_blank.png
    - assets/e3lam_template_blank.png
    - assets/r7_template_blank.png
    - assets/tasryh_zawjaa_template_blank.png
    - assets/employee_declaration_template_blank.png
    - assets/efada_template_blank.png
    